openapi: 3.0.3
info:
  title: sub2api User API
  version: v1
  description: |
    User-facing API contract for sub2api backend.
    Covers public + authenticated user endpoints (no admin/gateway).

servers:
  - url: '{baseUrl}'
    variables:
      baseUrl:
        default: http://localhost:8080

tags:
  - name: Auth
    description: Authentication & registration
  - name: User
    description: User profile management
  - name: TOTP
    description: Two-factor authentication
  - name: Keys
    description: API key management
  - name: Groups
    description: Group information
  - name: Usage
    description: Usage logs & statistics
  - name: Dashboard
    description: Dashboard analytics
  - name: Announcements
    description: User announcements
  - name: Redeem
    description: Redeem codes
  - name: Subscriptions
    description: User subscriptions
  - name: Settings
    description: Public settings

# ── Security ──────────────────────────────────────────────
security: []

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  # ── Reusable Schemas ──────────────────────────────────
  schemas:
    # ── Envelope ──
    ApiResponse:
      type: object
      required: [code, message]
      properties:
        code:
          type: integer
          description: '0 = success, otherwise HTTP status code'
        message:
          type: string
        reason:
          type: string
        metadata:
          type: object
          additionalProperties:
            type: string
        data: {}

    PaginatedData:
      type: object
      required: [items, total, page, page_size, pages]
      properties:
        items:
          type: array
          items: {}
        total:
          type: integer
          format: int64
        page:
          type: integer
        page_size:
          type: integer
        pages:
          type: integer

    # ── Entities ──
    User:
      type: object
      required: [id, email, username, role, balance, concurrency, status, created_at, updated_at]
      properties:
        id:
          type: integer
          format: int64
        email:
          type: string
          format: email
        username:
          type: string
        role:
          type: string
        balance:
          type: number
          format: double
        concurrency:
          type: integer
        status:
          type: string
        allowed_groups:
          type: array
          items:
            type: integer
            format: int64
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        api_keys:
          type: array
          items:
            $ref: '#/components/schemas/APIKey'
        subscriptions:
          type: array
          items:
            $ref: '#/components/schemas/UserSubscription'

    APIKey:
      type: object
      required: [id, user_id, key, name, status, quota, quota_used, created_at, updated_at]
      properties:
        id:
          type: integer
          format: int64
        user_id:
          type: integer
          format: int64
        key:
          type: string
        name:
          type: string
        group_id:
          type: integer
          format: int64
          nullable: true
        status:
          type: string
          enum: [active, inactive]
        ip_whitelist:
          type: array
          items:
            type: string
        ip_blacklist:
          type: array
          items:
            type: string
        last_used_at:
          type: string
          format: date-time
          nullable: true
        quota:
          type: number
          format: double
          description: 'USD, 0 = unlimited'
        quota_used:
          type: number
          format: double
        expires_at:
          type: string
          format: date-time
          nullable: true
        rate_limit_5h:
          type: number
          format: double
        rate_limit_1d:
          type: number
          format: double
        rate_limit_7d:
          type: number
          format: double
        usage_5h:
          type: number
          format: double
        usage_1d:
          type: number
          format: double
        usage_7d:
          type: number
          format: double
        window_5h_start:
          type: string
          format: date-time
          nullable: true
        window_1d_start:
          type: string
          format: date-time
          nullable: true
        window_7d_start:
          type: string
          format: date-time
          nullable: true
        reset_5h_at:
          type: string
          format: date-time
          nullable: true
        reset_1d_at:
          type: string
          format: date-time
          nullable: true
        reset_7d_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        user:
          $ref: '#/components/schemas/User'
        group:
          $ref: '#/components/schemas/Group'

    Group:
      type: object
      required: [id, name, description, platform, rate_multiplier, is_exclusive, status, subscription_type, created_at, updated_at]
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        description:
          type: string
        platform:
          type: string
        rate_multiplier:
          type: number
          format: double
        is_exclusive:
          type: boolean
        status:
          type: string
        subscription_type:
          type: string
        daily_limit_usd:
          type: number
          format: double
          nullable: true
        weekly_limit_usd:
          type: number
          format: double
          nullable: true
        monthly_limit_usd:
          type: number
          format: double
          nullable: true
        image_price_1k:
          type: number
          format: double
          nullable: true
        image_price_2k:
          type: number
          format: double
          nullable: true
        image_price_4k:
          type: number
          format: double
          nullable: true
        claude_code_only:
          type: boolean
        fallback_group_id:
          type: integer
          format: int64
          nullable: true
        fallback_group_id_on_invalid_request:
          type: integer
          format: int64
          nullable: true
        allow_messages_dispatch:
          type: boolean
        require_oauth_only:
          type: boolean
        require_privacy_set:
          type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    UsageLog:
      type: object
      required: [id, user_id, api_key_id, account_id, request_id, model, input_tokens, output_tokens, total_cost, actual_cost, rate_multiplier, billing_type, request_type, stream, created_at]
      properties:
        id:
          type: integer
          format: int64
        user_id:
          type: integer
          format: int64
        api_key_id:
          type: integer
          format: int64
        account_id:
          type: integer
          format: int64
        request_id:
          type: string
        model:
          type: string
        service_tier:
          type: string
          nullable: true
        reasoning_effort:
          type: string
          nullable: true
        inbound_endpoint:
          type: string
          nullable: true
        upstream_endpoint:
          type: string
          nullable: true
        group_id:
          type: integer
          format: int64
          nullable: true
        subscription_id:
          type: integer
          format: int64
          nullable: true
        input_tokens:
          type: integer
        output_tokens:
          type: integer
        cache_creation_tokens:
          type: integer
        cache_read_tokens:
          type: integer
        cache_creation_5m_tokens:
          type: integer
        cache_creation_1h_tokens:
          type: integer
        input_cost:
          type: number
          format: double
        output_cost:
          type: number
          format: double
        cache_creation_cost:
          type: number
          format: double
        cache_read_cost:
          type: number
          format: double
        total_cost:
          type: number
          format: double
        actual_cost:
          type: number
          format: double
        rate_multiplier:
          type: number
          format: double
        billing_type:
          type: integer
        request_type:
          type: string
        stream:
          type: boolean
        openai_ws_mode:
          type: boolean
        duration_ms:
          type: integer
          nullable: true
        first_token_ms:
          type: integer
          nullable: true
        image_count:
          type: integer
        image_size:
          type: string
          nullable: true
        media_type:
          type: string
          nullable: true
        user_agent:
          type: string
          nullable: true
        cache_ttl_overridden:
          type: boolean
        billing_mode:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
        user:
          $ref: '#/components/schemas/User'
        api_key:
          $ref: '#/components/schemas/APIKey'
        group:
          $ref: '#/components/schemas/Group'
        subscription:
          $ref: '#/components/schemas/UserSubscription'

    UserSubscription:
      type: object
      required: [id, user_id, group_id, starts_at, expires_at, status, daily_usage_usd, weekly_usage_usd, monthly_usage_usd, created_at, updated_at]
      properties:
        id:
          type: integer
          format: int64
        user_id:
          type: integer
          format: int64
        group_id:
          type: integer
          format: int64
        starts_at:
          type: string
          format: date-time
        expires_at:
          type: string
          format: date-time
        status:
          type: string
        daily_window_start:
          type: string
          format: date-time
          nullable: true
        weekly_window_start:
          type: string
          format: date-time
          nullable: true
        monthly_window_start:
          type: string
          format: date-time
          nullable: true
        daily_usage_usd:
          type: number
          format: double
        weekly_usage_usd:
          type: number
          format: double
        monthly_usage_usd:
          type: number
          format: double
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        user:
          $ref: '#/components/schemas/User'
        group:
          $ref: '#/components/schemas/Group'

    UserAnnouncement:
      type: object
      required: [id, title, content, notify_mode, created_at, updated_at]
      properties:
        id:
          type: integer
          format: int64
        title:
          type: string
        content:
          type: string
        notify_mode:
          type: string
        starts_at:
          type: string
          format: date-time
          nullable: true
        ends_at:
          type: string
          format: date-time
          nullable: true
        read_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    RedeemCode:
      type: object
      required: [id, code, type, value, status, validity_days, created_at]
      properties:
        id:
          type: integer
          format: int64
        code:
          type: string
        type:
          type: string
        value:
          type: number
          format: double
        status:
          type: string
        used_by:
          type: integer
          format: int64
          nullable: true
        used_at:
          type: string
          format: date-time
          nullable: true
        group_id:
          type: integer
          format: int64
          nullable: true
        validity_days:
          type: integer
        notes:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
        user:
          $ref: '#/components/schemas/User'
        group:
          $ref: '#/components/schemas/Group'

    PublicSettings:
      type: object
      required: [registration_enabled, email_verify_enabled, totp_enabled, turnstile_enabled, site_name, version]
      properties:
        registration_enabled:
          type: boolean
        email_verify_enabled:
          type: boolean
        registration_email_suffix_whitelist:
          type: array
          items:
            type: string
        promo_code_enabled:
          type: boolean
        password_reset_enabled:
          type: boolean
        invitation_code_enabled:
          type: boolean
        totp_enabled:
          type: boolean
        turnstile_enabled:
          type: boolean
        turnstile_site_key:
          type: string
        site_name:
          type: string
        site_logo:
          type: string
        site_subtitle:
          type: string
        api_base_url:
          type: string
        contact_info:
          type: string
        doc_url:
          type: string
        home_content:
          type: string
        hide_ccs_import_button:
          type: boolean
        purchase_subscription_enabled:
          type: boolean
        purchase_subscription_url:
          type: string
        custom_menu_items:
          type: array
          items:
            $ref: '#/components/schemas/CustomMenuItem'
        custom_endpoints:
          type: array
          items:
            $ref: '#/components/schemas/CustomEndpoint'
        linuxdo_oauth_enabled:
          type: boolean
        backend_mode_enabled:
          type: boolean
        version:
          type: string

    CustomMenuItem:
      type: object
      required: [id, label, url, visibility, sort_order]
      properties:
        id:
          type: string
        label:
          type: string
        icon_svg:
          type: string
        url:
          type: string
        visibility:
          type: string
        sort_order:
          type: integer

    CustomEndpoint:
      type: object
      required: [name, endpoint]
      properties:
        name:
          type: string
        endpoint:
          type: string
        description:
          type: string

    # ── Auth DTOs ──
    AuthResponse:
      type: object
      required: [access_token, token_type, user]
      properties:
        access_token:
          type: string
        refresh_token:
          type: string
        expires_in:
          type: integer
        token_type:
          type: string
        user:
          $ref: '#/components/schemas/User'

    TotpLoginResponse:
      type: object
      required: [requires_2fa]
      properties:
        requires_2fa:
          type: boolean
        temp_token:
          type: string
        user_email_masked:
          type: string

    RefreshTokenResponse:
      type: object
      required: [access_token, refresh_token, expires_in, token_type]
      properties:
        access_token:
          type: string
        refresh_token:
          type: string
        expires_in:
          type: integer
        token_type:
          type: string

    SendVerifyCodeResponse:
      type: object
      required: [message, countdown]
      properties:
        message:
          type: string
        countdown:
          type: integer

    ValidatePromoCodeResponse:
      type: object
      required: [valid]
      properties:
        valid:
          type: boolean
        bonus_amount:
          type: number
          format: double
        error_code:
          type: string
        message:
          type: string

    ValidateInvitationCodeResponse:
      type: object
      required: [valid]
      properties:
        valid:
          type: boolean
        error_code:
          type: string

    # ── User response with run_mode ──
    UserWithRunMode:
      allOf:
        - $ref: '#/components/schemas/User'
        - type: object
          required: [run_mode]
          properties:
            run_mode:
              type: string

    # ── TOTP DTOs ──
    TotpStatusResponse:
      type: object
      required: [enabled, feature_enabled]
      properties:
        enabled:
          type: boolean
        enabled_at:
          type: integer
          format: int64
          nullable: true
        feature_enabled:
          type: boolean

    TotpSetupResponse:
      type: object
      required: [secret, qr_code_url, setup_token, countdown]
      properties:
        secret:
          type: string
        qr_code_url:
          type: string
        setup_token:
          type: string
        countdown:
          type: integer

    # ── Usage/Dashboard DTOs ──
    UsageStats:
      type: object
      required: [total_requests, total_input_tokens, total_output_tokens, total_cache_tokens, total_tokens, total_cost, total_actual_cost, average_duration_ms]
      properties:
        total_requests:
          type: integer
          format: int64
        total_input_tokens:
          type: integer
          format: int64
        total_output_tokens:
          type: integer
          format: int64
        total_cache_tokens:
          type: integer
          format: int64
        total_tokens:
          type: integer
          format: int64
        total_cost:
          type: number
          format: double
        total_actual_cost:
          type: number
          format: double
        average_duration_ms:
          type: number
          format: double

    UserDashboardStats:
      type: object
      required: [total_api_keys, active_api_keys, total_requests, total_tokens, total_cost, total_actual_cost, today_requests, today_tokens, today_cost, today_actual_cost]
      properties:
        total_api_keys:
          type: integer
          format: int64
        active_api_keys:
          type: integer
          format: int64
        total_requests:
          type: integer
          format: int64
        total_input_tokens:
          type: integer
          format: int64
        total_output_tokens:
          type: integer
          format: int64
        total_cache_creation_tokens:
          type: integer
          format: int64
        total_cache_read_tokens:
          type: integer
          format: int64
        total_tokens:
          type: integer
          format: int64
        total_cost:
          type: number
          format: double
        total_actual_cost:
          type: number
          format: double
        today_requests:
          type: integer
          format: int64
        today_input_tokens:
          type: integer
          format: int64
        today_output_tokens:
          type: integer
          format: int64
        today_cache_creation_tokens:
          type: integer
          format: int64
        today_cache_read_tokens:
          type: integer
          format: int64
        today_tokens:
          type: integer
          format: int64
        today_cost:
          type: number
          format: double
        today_actual_cost:
          type: number
          format: double
        average_duration_ms:
          type: number
          format: double
        rpm:
          type: integer
          format: int64
        tpm:
          type: integer
          format: int64

    TrendDataPoint:
      type: object
      required: [date, requests, input_tokens, output_tokens, total_tokens, cost, actual_cost]
      properties:
        date:
          type: string
        requests:
          type: integer
          format: int64
        input_tokens:
          type: integer
          format: int64
        output_tokens:
          type: integer
          format: int64
        cache_creation_tokens:
          type: integer
          format: int64
        cache_read_tokens:
          type: integer
          format: int64
        total_tokens:
          type: integer
          format: int64
        cost:
          type: number
          format: double
        actual_cost:
          type: number
          format: double

    ModelStat:
      type: object
      required: [model, requests, input_tokens, output_tokens, total_tokens, cost, actual_cost]
      properties:
        model:
          type: string
        requests:
          type: integer
          format: int64
        input_tokens:
          type: integer
          format: int64
        output_tokens:
          type: integer
          format: int64
        cache_creation_tokens:
          type: integer
          format: int64
        cache_read_tokens:
          type: integer
          format: int64
        total_tokens:
          type: integer
          format: int64
        cost:
          type: number
          format: double
        actual_cost:
          type: number
          format: double

    BatchAPIKeyUsageStats:
      type: object
      required: [api_key_id, today_actual_cost, total_actual_cost]
      properties:
        api_key_id:
          type: integer
          format: int64
        today_actual_cost:
          type: number
          format: double
        total_actual_cost:
          type: number
          format: double

    # ── Subscription DTOs ──
    UsageWindowProgress:
      type: object
      required: [limit_usd, used_usd, remaining_usd, percentage, window_start, resets_at, resets_in_seconds]
      properties:
        limit_usd:
          type: number
          format: double
        used_usd:
          type: number
          format: double
        remaining_usd:
          type: number
          format: double
        percentage:
          type: number
          format: double
        window_start:
          type: string
          format: date-time
        resets_at:
          type: string
          format: date-time
        resets_in_seconds:
          type: integer
          format: int64

    SubscriptionProgress:
      type: object
      required: [id, group_name, expires_at, expires_in_days]
      properties:
        id:
          type: integer
          format: int64
        group_name:
          type: string
        expires_at:
          type: string
          format: date-time
        expires_in_days:
          type: integer
        daily:
          $ref: '#/components/schemas/UsageWindowProgress'
        weekly:
          $ref: '#/components/schemas/UsageWindowProgress'
        monthly:
          $ref: '#/components/schemas/UsageWindowProgress'

    SubscriptionProgressInfo:
      type: object
      properties:
        subscription:
          $ref: '#/components/schemas/UserSubscription'
        progress:
          $ref: '#/components/schemas/SubscriptionProgress'

    SubscriptionSummaryItem:
      type: object
      required: [id, group_id, group_name, status]
      properties:
        id:
          type: integer
          format: int64
        group_id:
          type: integer
          format: int64
        group_name:
          type: string
        status:
          type: string
        daily_used_usd:
          type: number
          format: double
        daily_limit_usd:
          type: number
          format: double
        weekly_used_usd:
          type: number
          format: double
        weekly_limit_usd:
          type: number
          format: double
        monthly_used_usd:
          type: number
          format: double
        monthly_limit_usd:
          type: number
          format: double
        expires_at:
          type: string
          nullable: true

    SubscriptionSummary:
      type: object
      required: [active_count, total_used_usd, subscriptions]
      properties:
        active_count:
          type: integer
        total_used_usd:
          type: number
          format: double
        subscriptions:
          type: array
          items:
            $ref: '#/components/schemas/SubscriptionSummaryItem'

    # ── Generic message response ──
    MessageResponse:
      type: object
      required: [message]
      properties:
        message:
          type: string

    SuccessResponse:
      type: object
      required: [success]
      properties:
        success:
          type: boolean

    # ── Dashboard Trend response ──
    DashboardTrendResponse:
      type: object
      required: [trend, start_date, end_date, granularity]
      properties:
        trend:
          type: array
          items:
            $ref: '#/components/schemas/TrendDataPoint'
        start_date:
          type: string
        end_date:
          type: string
        granularity:
          type: string

    DashboardModelsResponse:
      type: object
      required: [models, start_date, end_date]
      properties:
        models:
          type: array
          items:
            $ref: '#/components/schemas/ModelStat'
        start_date:
          type: string
        end_date:
          type: string

    # ── Verification method ──
    VerificationMethod:
      type: object
      required: [method]
      properties:
        method:
          type: string

  # ── Reusable Parameters ──
  parameters:
    PageParam:
      in: query
      name: page
      schema:
        type: integer
        minimum: 1
        default: 1
    PageSizeParam:
      in: query
      name: page_size
      schema:
        type: integer
        minimum: 1
        maximum: 1000
        default: 20

# ── Paths ─────────────────────────────────────────────────
paths:
  # ── Settings ──
  /api/v1/settings/public:
    get:
      tags: [Settings]
      summary: Get public settings
      operationId: getPublicSettings
      responses:
        '200':
          description: Public settings
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/PublicSettings'

  # ── Auth (public) ──
  /api/v1/auth/register:
    post:
      tags: [Auth]
      summary: Register a new user
      operationId: register
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
                  minLength: 6
                verify_code:
                  type: string
