                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/APIKey'
    put:
      tags: [Keys]
      summary: Update API key
      operationId: updateKey
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                group_id:
                  type: integer
                  format: int64
                  nullable: true
                status:
                  type: string
                  enum: [active, inactive]
                ip_whitelist:
                  type: array
                  items:
                    type: string
                ip_blacklist:
                  type: array
                  items:
                    type: string
                quota:
                  type: number
                  format: double
                  nullable: true
                expires_at:
                  type: string
                  nullable: true
