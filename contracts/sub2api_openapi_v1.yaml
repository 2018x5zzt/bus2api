        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:
                  type: string
                group_id:
                  type: integer
                  format: int64
                  nullable: true
                custom_key:
                  type: string
                  nullable: true
                ip_whitelist:
                  type: array
                  items:
                    type: string
                ip_blacklist:
                  type: array
                  items:
                    type: string
                quota:
                  type: number
                  format: double
                  nullable: true
                expires_in_days:
                  type: integer
                  nullable: true
                rate_limit_5h:
                  type: number
                  format: double
                  nullable: true
                rate_limit_1d:
                  type: number
                  format: double
                  nullable: true
                rate_limit_7d:
                  type: number
                  format: double
                  nullable: true
      responses:
        '201':
          description: API key created
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/APIKey'

