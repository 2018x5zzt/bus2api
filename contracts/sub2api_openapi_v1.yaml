          name: group_id
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Paginated API keys
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        allOf:
